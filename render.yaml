services:
  - type: web
    name: swiftship-app
    runtime: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm install
      npm run build
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
      php artisan migrate --force
      php artisan db:seed --force
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: SwiftShip
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: swiftship-app
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: swiftship-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: swiftship-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: swiftship-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: swiftship-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: swiftship-db
          property: password
      - key: DB_SSLMODE
        value: require
      - key: CACHE_DRIVER
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: BROADCAST_DRIVER
        value: log
      - key: LOG_CHANNEL
        value: stderr

databases:
  - name: swiftship-db
    plan: free
    databaseName: swiftship
    user: swiftship_user
